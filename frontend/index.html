<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - API Sistema Hospitalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-hospital-symbol"></i> HealthSync
            </div>
            <nav class="nav-menu" id="navMenu">
                <button class="nav-item active" data-entity="pacientes"><i class="fas fa-users"></i> Pacientes</button>
                <button class="nav-item" data-entity="medicos"><i class="fas fa-user-md"></i> Médicos</button>
                <button class="nav-item" data-entity="especialidades"><i class="fas fa-stethoscope"></i> Especialidades</button>
                <button class="nav-item" data-entity="consultas"><i class="fas fa-calendar-check"></i> Consultas</button>
                <button class="nav-item" data-entity="prontuarios"><i class="fas fa-notes-medical"></i> Prontuários</button>
                <button class="nav-item" data-entity="apikeys"><i class="fas fa-key"></i> API Keys</button>
            </nav>
            <div class="sidebar-footer">
                <a href="/swagger-ui/index.html" class="swagger-link"><i class="fas fa-book"></i> Swagger Docs</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Global Config Header -->
            <header class="top-header">
                <div class="header-title">
                    <h2 id="pageTitle">Pacientes</h2>
                </div>
                <div class="global-config">
                    <div class="input-group">
                        <label title="Header: X-API-Key"><i class="fas fa-lock"></i> API Key</label>
                        <input type="password" id="globalApiKey" placeholder="Sua API Key">
                    </div>
                    <div class="input-group">
                        <label title="Header: X-Idempotency-Key"><i class="fas fa-shield-alt"></i> Idempotency Key</label>
                        <input type="text" id="globalIdempotency" placeholder="Chave Única (POST)">
                    </div>
                    <div class="input-group">
                        <label title="Header: X-API-Version"><i class="fas fa-code-branch"></i> Version</label>
                        <select id="globalVersion">
                            <option value="1">V1</option>
                            <option value="2">V2</option>
                        </select>
                    </div>
                </div>
            </header>

            <!-- Data Panel -->
            <div class="data-panel">
                <div class="panel-header">
                    <div class="pagination-info">
                        Exibindo página <span id="currentPage">0</span> - Total: <span id="totalItems">0</span> itens
                    </div>
                    <div class="actions">
                        <button class="btn-icon" id="btnRefresh" title="Atualizar"><i class="fas fa-sync-alt"></i></button>
                        <button class="btn-primary" id="btnNovo"><i class="fas fa-plus"></i> Novo Registro</button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr id="tableHeader">
                                <!-- Generated Dynamically -->
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Generated Dynamically -->
                        </tbody>
                    </table>
                    <div id="loadingIndicator" class="loading-overlay hidden">
                        <div class="spinner"></div>
                    </div>
                    <div id="emptyState" class="empty-state hidden">
                        <i class="fas fa-folder-open"></i>
                        <p>Nenhum registro encontrado.</p>
                    </div>
                </div>

                <div class="pagination-controls">
                    <button id="btnPrev" class="btn-page" disabled><i class="fas fa-chevron-left"></i> Anterior</button>
                    <select id="pageSize" class="page-size-select">
                        <option value="5">5 por página</option>
                        <option value="10" selected>10 por página</option>
                        <option value="20">20 por página</option>
                    </select>
                    <button id="btnNext" class="btn-page" disabled>Próxima <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Dynamic Modal -->
    <div id="formModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nova Entrada</h3>
                <button class="btn-close" id="btnCloseModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="dynamicForm">
                    <!-- Generated Dynamically -->
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btnCancelModal">Cancelar</button>
                <button class="btn-primary" id="btnSaveModal"><i class="fas fa-save"></i> Salvar</button>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalhes do Registro</h3>
                <button class="btn-close" id="btnCloseDetails"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="detailsContent">
                <!-- JSON Pre or Details -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
